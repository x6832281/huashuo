name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python test_rate_limiter.py
          python deep_test_09_15_backend.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: "api"
        env:
          HD_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          HD_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HD_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HD_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          HD_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
